services:
  postgres:
    image: postgres:16
    container_name: fit-forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fit_forge
    ports:
      - "5433:5432"
    volumes:
      - fit_forge_postgres_data:/var/lib/postgresql/data

volumes:
  fit_forge_postgres_data:
